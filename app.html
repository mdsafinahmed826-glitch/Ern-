<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Monetag SDK Integration -->
    <script src='//libtl.com/sdk.js' data-zone='10352096' data-sdk='show_10352096'></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #020617; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-gradient { background: linear-gradient(135deg, #2563eb, #7c3aed); }
        .task-card { transition: all 0.3s ease; cursor: pointer; }
        .task-card:active { transform: scale(0.97); }
        #mini-notice-bar { position: sticky; top: 0; z-index: 100; }
        .method-btn.active { border-color: #2563eb; background: rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body class="min-h-screen pb-28">

    <!-- অ্যাডমিন নোটিশ -->
    <div id="mini-notice-bar" class="bg-blue-600 text-white py-2 px-4 hidden shadow-lg">
        <marquee id="notice-text" behavior="scroll" direction="left" scrollamount="6" class="text-xs font-bold"></marquee>
    </div>

    <!-- লগইন স্ক্রিন -->
    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[2000] flex flex-col items-center justify-center p-8">
        <div class="text-center mb-10">
            <div class="w-24 h-24 bg-blue-600 rounded-[2rem] mx-auto flex items-center justify-center text-5xl mb-6 shadow-2xl shadow-blue-500/30">
                <i class="fas fa-bolt text-white"></i>
            </div>
            <h1 class="text-4xl font-black text-white italic">EarnPro <span class="text-blue-500">Mini</span></h1>
            <p class="text-slate-400 mt-3 font-medium">Monetag Ads দেখে আয় করুন</p>
        </div>
        
        <button onclick="signInWithGoogle()" class="w-full max-w-xs bg-white text-slate-900 font-black py-5 rounded-[1.5rem] flex items-center justify-center gap-4 shadow-2xl active:scale-95 transition">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-6 h-6">
            গুগল দিয়ে প্রবেশ করুন
        </button>
    </div>

    <!-- মূল অ্যাপ স্ক্রিন -->
    <div id="app-screen" class="hidden animate-in fade-in duration-500">
        <header class="p-6 flex justify-between items-center bg-slate-900/40 border-b border-white/5">
            <div class="flex items-center gap-3">
                <img id="user-photo" src="" class="w-12 h-12 rounded-full border-2 border-blue-500 shadow-xl">
                <div>
                    <h4 id="user-name" class="text-sm font-bold text-white truncate max-w-[120px]">User</h4>
                    <p class="text-[10px] text-blue-400 font-mono" id="user-id-display">ID: ---</p>
                </div>
            </div>
            <div class="glass px-5 py-3 rounded-2xl border-blue-500/20 text-right">
                <p class="text-[9px] text-slate-500 font-bold uppercase">ব্যালেন্স</p>
                <h3 class="text-xl font-black text-green-500">৳<span id="balance">0.00</span></h3>
            </div>
        </header>

        <main class="px-6 mt-6 pb-20">
            <div class="space-y-6">
                <!-- স্ট্যাটাস -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-5 rounded-[2rem] border-b-2 border-blue-500/50">
                        <i class="fas fa-mouse text-blue-500 mb-2"></i>
                        <p class="text-[10px] text-slate-500 font-bold">মোট ক্লিক</p>
                        <h4 id="user-clicks" class="text-xl font-black">0</h4>
                    </div>
                    <div class="glass p-5 rounded-[2rem] border-b-2 border-purple-500/50">
                        <i class="fas fa-ad text-purple-500 mb-2"></i>
                        <p class="text-[10px] text-slate-500 font-bold">CPM রেট</p>
                        <h4 class="text-xl font-black">৳০.০৭</h4>
                    </div>
                </div>

                <!-- টাস্ক লিস্ট -->
                <div class="space-y-4">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-play-circle text-yellow-500"></i> Monetag টাস্ক</h2>
                    
                    <div onclick="playInterstitialAd()" class="task-card glass p-5 rounded-[2rem] flex items-center justify-between border-l-4 border-blue-500">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500"><i class="fas fa-tv"></i></div>
                            <div>
                                <h4 class="font-bold text-sm">রিওয়ার্ড অ্যাড (১)</h4>
                                <p class="text-[10px] text-slate-500">পুরোটা দেখলে পাবেন ৳০.০৭</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-slate-700"></i>
                    </div>

                    <div onclick="playPopupAd()" class="task-card glass p-5 rounded-[2rem] flex items-center justify-between border-l-4 border-purple-500">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-purple-500/10 rounded-2xl flex items-center justify-center text-purple-500"><i class="fas fa-window-restore"></i></div>
                            <div>
                                <h4 class="font-bold text-sm">রিওয়ার্ড পপ-আপ (২)</h4>
                                <p class="text-[10px] text-slate-500">পপ-আপ দেখলে পাবেন ৳০.০৭</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-slate-700"></i>
                    </div>

                    <div onclick="openDirectLink()" class="task-card glass p-5 rounded-[2rem] flex items-center justify-between border-l-4 border-green-500">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center text-green-500"><i class="fas fa-link"></i></div>
                            <div>
                                <h4 class="font-bold text-sm">ডাইরেক্ট লিঙ্ক টাস্ক</h4>
                                <p class="text-[10px] text-slate-500">ভিজিট করে বোনাস নিন</p>
                            </div>
                        </div>
                        <i class="fas fa-external-link-alt text-slate-700"></i>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Nav -->
        <nav class="fixed bottom-0 left-0 w-full glass border-t border-white/5 px-8 py-5 flex justify-between items-center rounded-t-[3rem] z-[100]">
            <button class="text-blue-500 flex flex-col items-center gap-1"><i class="fas fa-home"></i><span class="text-[8px] font-bold uppercase">Home</span></button>
            <button onclick="showModal('হিস্ট্রি', 'আপনার পেমেন্ট রেকর্ড খালি।', '📜')" class="text-slate-500 flex flex-col items-center gap-1"><i class="fas fa-history"></i><span class="text-[8px] font-bold uppercase">History</span></button>
            <button onclick="openWithdrawModal()" class="text-slate-500 flex flex-col items-center gap-1"><i class="fas fa-wallet"></i><span class="text-[8px] font-bold uppercase">Withdraw</span></button>
            <button onclick="auth.signOut()" class="text-red-500 flex flex-col items-center gap-1"><i class="fas fa-sign-out-alt"></i><span class="text-[8px] font-bold uppercase">Exit</span></button>
        </nav>
    </div>

    <!-- পেমেন্ট মোডাল (বিকাশ ও নগদ) -->
    <div id="withdraw-modal" class="fixed inset-0 bg-black/90 z-[3000] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="glass p-8 rounded-[3rem] w-full max-w-sm border-t-4 border-blue-600 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-white text-center">টাকা উত্তোলন করুন</h3>
            
            <div class="flex gap-2 mb-4">
                <button onclick="selectMethod('Bkash')" id="btn-bkash" class="method-btn flex-1 glass py-3 rounded-2xl border border-white/10 text-xs font-bold transition">বিকাশ</button>
                <button onclick="selectMethod('Nagad')" id="btn-nagad" class="method-btn flex-1 glass py-3 rounded-2xl border border-white/10 text-xs font-bold transition">নগদ</button>
            </div>

            <input type="number" id="withdraw-amount" placeholder="পরিমাণ (৳)" class="w-full bg-slate-800/50 border border-white/10 rounded-2xl p-4 mb-3 text-white outline-none focus:border-blue-500">
            <input type="number" id="withdraw-number" placeholder="আপনার নম্বর" class="w-full bg-slate-800/50 border border-white/10 rounded-2xl p-4 mb-6 text-white outline-none focus:border-blue-500">
            
            <div class="flex gap-3">
                <button onclick="closeWithdrawModal()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-bold">বাতিল</button>
                <button onclick="submitWithdraw()" class="flex-1 btn-gradient py-4 rounded-2xl font-black shadow-lg">রিকোয়েস্ট দিন</button>
            </div>
        </div>
    </div>

    <!-- সাধারণ মোডাল -->
    <div id="modal" class="fixed inset-0 bg-black/90 z-[4000] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="glass p-8 rounded-[3rem] w-full max-w-xs text-center border-t-4 border-blue-600 shadow-2xl">
            <div id="modal-icon" class="text-5xl mb-4"></div>
            <h3 id="modal-title" class="text-xl font-bold mb-2 text-white"></h3>
            <p id="modal-text" class="text-sm text-slate-400 mb-8"></p>
            <button onclick="closeModal()" class="w-full btn-gradient py-4 rounded-2xl font-black shadow-lg">বন্ধ করুন</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJwBkkuTwCpnEB6-JD4axqms5OniGr9-s",
            authDomain: "ern-93752.firebaseapp.com",
            databaseURL: "https://ern-93752-default-rtdb.firebaseio.com",
            projectId: "ern-93752",
            storageBucket: "ern-93752.firebasestorage.app",
            messagingSenderId: "159583001756",
            appId: "1:159583001756:web:c7c8380f88da94ba97e159"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const REWARD_AMOUNT = 0.07;
        let selectedPaymentMethod = "";

        // ১. Reward Ad Logic
        function playInterstitialAd() {
            if (typeof show_10352096 === 'function') {
                show_10352096().then(() => giveReward("ইন্টারস্টিশিয়াল অ্যাড"))
                .catch(err => showModal("ত্রুটি", "অ্যাড লোড হয়নি।", "❌"));
            } else { showModal("অপেক্ষা করুন", "অ্যাড সার্ভিস লোড হচ্ছে...", "⏳"); }
        }

        function playPopupAd() {
            if (typeof show_10352096 === 'function') {
                show_10352096('pop').then(() => giveReward("পপ-আপ অ্যাড"))
                .catch(e => console.log(e));
            }
        }

        function openDirectLink() {
            window.open('https://omg10.com/4/10927827', '_blank');
            setTimeout(() => giveReward("ডাইরেক্ট লিঙ্ক"), 5000);
        }

        function giveReward(taskName) {
            const user = auth.currentUser;
            if(!user) return;
            db.collection('users').doc(user.uid).update({
                balance: firebase.firestore.FieldValue.increment(REWARD_AMOUNT),
                clicks: firebase.firestore.FieldValue.increment(1)
            }).then(() => showModal("সাফল্য!", `আপনি ৳${REWARD_AMOUNT} পেয়েছেন।`, "💰"));
        }

        // ২. উইথড্র সিস্টেম আপডেট
        function openWithdrawModal() {
            const currentBal = parseFloat(document.getElementById('balance').innerText);
            if(currentBal < 50) {
                showModal("ব্যালেন্স কম", "কমপক্ষে ৫০ টাকা আয় করুন।", "❌");
                return;
            }
            document.getElementById('withdraw-modal').classList.remove('hidden');
        }

        function closeWithdrawModal() {
            document.getElementById('withdraw-modal').classList.add('hidden');
            selectedPaymentMethod = "";
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
        }

        function selectMethod(method) {
            selectedPaymentMethod = method;
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${method.toLowerCase()}`).classList.add('active');
        }

        function submitWithdraw() {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            const number = document.getElementById('withdraw-number').value;
            const currentBal = parseFloat(document.getElementById('balance').innerText);

            if(!selectedPaymentMethod) return alert("পেমেন্ট মেথড সিলেক্ট করুন!");
            if(!amount || amount < 50) return alert("সর্বনিম্ন ৫০ টাকা উত্তোলন করতে পারবেন।");
            if(amount > currentBal) return alert("আপনার পর্যাপ্ত ব্যালেন্স নেই।");
            if(!number || number.length < 11) return alert("সঠিক নম্বর দিন।");

            db.collection('withdraws').add({
                userId: auth.currentUser.uid,
                userName: auth.currentUser.displayName,
                amount: amount,
                number: number,
                method: selectedPaymentMethod,
                status: "Pending",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                db.collection('users').doc(auth.currentUser.uid).update({
                    balance: firebase.firestore.FieldValue.increment(-amount)
                });
                closeWithdrawModal();
                showModal("সাফল্য", "রিকোয়েস্ট পাঠানো হয়েছে।", "✅");
            });
        }

        // ৩. সিঙ্কিং এবং অথেনটিকেশন
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-photo').src = user.photoURL || '';
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-id-display').innerText = "ID: " + user.uid.substring(0, 10).toUpperCase();
                
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        document.getElementById('balance').innerText = (d.balance || 0).toFixed(2);
                        document.getElementById('user-clicks').innerText = d.clicks || 0;
                    } else {
                        db.collection('users').doc(user.uid).set({ balance: 0, clicks: 0, name: user.displayName, email: user.email });
                    }
                });

                db.collection('admin_settings').doc('global').onSnapshot(doc => {
                    if (doc.exists && doc.data().notice) {
                        document.getElementById('notice-text').innerText = "📢 " + doc.data().notice;
                        document.getElementById('mini-notice-bar').classList.remove('hidden');
                    }
                });
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function signInWithGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

        function showModal(title, text, icon) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
