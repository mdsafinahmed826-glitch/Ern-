<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, onSnapshot, query, where, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJwBkkuTwCpnEB6-JD4axqms5OniGr9-s",
            authDomain: "ern-93752.firebaseapp.com",
            databaseURL: "https://ern-93752-default-rtdb.firebaseio.com",
            projectId: "ern-93752",
            storageBucket: "ern-93752.firebasestorage.app",
            messagingSenderId: "159583001756",
            appId: "1:159583001756:web:c7c8380f88da94ba97e159"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Global state
        let userData = null;
        let taskSettings = {
            task1: true,
            task2: true,
            task3: true
        };
        const REWARD_AMOUNT = 0.07;
        let selectedPaymentMethod = "";

        // Elements
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const historyScreen = document.getElementById('history-screen');
        const withdrawModal = document.getElementById('withdraw-modal');
        const mainModal = document.getElementById('modal');

        // Authentication logic
        window.signInWithGoogle = () => {
            signInWithPopup(auth, provider).catch(err => console.error(err));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                document.getElementById('user-photo').src = user.photoURL || '';
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-id-display').innerText = "ID: " + user.uid.substring(0, 10).toUpperCase();

                // 1. User profile listener
                const userRef = doc(db, 'artifacts', 'ern-93752', 'users', user.uid, 'profile', 'data');
                onSnapshot(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        userData = snapshot.data();
                        document.getElementById('balance').innerText = (userData.balance || 0).toFixed(2);
                        document.getElementById('user-clicks').innerText = userData.clicks || 0;
                    } else {
                        setDoc(userRef, { balance: 0, clicks: 0, name: user.displayName, email: user.email });
                    }
                });

                // 2. Admin Global Settings (Task On/Off & Notice)
                // Path: artifacts -> ern-93752 -> public -> settings -> global
                const adminRef = doc(db, 'artifacts', 'ern-93752', 'public', 'settings', 'global');
                onSnapshot(adminRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        // Notice logic
                        if (data.notice) {
                            document.getElementById('notice-text').innerText = "📢 " + data.notice;
                            document.getElementById('mini-notice-bar').classList.remove('hidden');
                        } else {
                            document.getElementById('mini-notice-bar').classList.add('hidden');
                        }

                        // Task On/Off logic (Strict Check)
                        taskSettings.task1 = (data.task1 !== false); // Default true unless false
                        taskSettings.task2 = (data.task2 !== false);
                        taskSettings.task3 = (data.task3 !== false);

                        // Visual feedback on UI (Optional: can fade out disabled tasks)
                        updateTaskUI();
                    }
                }, (error) => console.error("Admin Settings Error:", error));
            } else {
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
                historyScreen.classList.add('hidden');
            }
        });

        function updateTaskUI() {
            const tasks = ['task-card-1', 'task-card-2', 'task-card-3'];
            const states = [taskSettings.task1, taskSettings.task2, taskSettings.task3];
            
            tasks.forEach((id, index) => {
                const el = document.getElementById(id);
                if(el) {
                    if(!states[index]) {
                        el.style.opacity = "0.5";
                        el.style.filter = "grayscale(0.8)";
                    } else {
                        el.style.opacity = "1";
                        el.style.filter = "none";
                    }
                }
            });
        }

        // Tasks logic
        window.playInterstitialAd = () => {
            if (!taskSettings.task1) return showModal("দুঃখিত", "অ্যাডমিন এই টাস্কটি সাময়িকভাবে বন্ধ রেখেছেন।", "🚫");
            
            if (typeof show_10352096 === 'function') {
                show_10352096().then(() => giveReward("Interstitial Ad"))
                .catch(() => showModal("ত্রুটি", "অ্যাড লোড হয়নি।", "❌"));
            } else { showModal("অপেক্ষা করুন", "অ্যাড সার্ভিস লোড হচ্ছে...", "⏳"); }
        };

        window.playPopupAd = () => {
            if (!taskSettings.task2) return showModal("দুঃখিত", "পপ-আপ টাস্ক বর্তমানে বন্ধ আছে।", "🚫");

            if (typeof show_10352096 === 'function') {
                show_10352096('pop').then(() => giveReward("Popup Ad"));
            }
        };

        window.openDirectLink = () => {
            if (!taskSettings.task3) return showModal("দুঃখিত", "ডাইরেক্ট লিঙ্ক বর্তমানে বন্ধ আছে।", "🚫");

            window.open('https://omg10.com/4/10927827', '_blank');
            setTimeout(() => giveReward("Direct Link"), 5000);
        };

        async function giveReward(taskName) {
            const user = auth.currentUser;
            if(!user) return;
            const userRef = doc(db, 'artifacts', 'ern-93752', 'users', user.uid, 'profile', 'data');
            await updateDoc(userRef, {
                balance: increment(REWARD_AMOUNT),
                clicks: increment(1)
            });
            showModal("সাফল্য!", `আপনি ${taskName} থেকে ৳${REWARD_AMOUNT} পেয়েছেন।`, "💰");
        }

        // Withdraw & Modal functions
        window.openWithdrawModal = () => {
            const balance = parseFloat(document.getElementById('balance').innerText);
            if(balance < 50) return showModal("ব্যালেন্স কম", "কমপক্ষে ৫০ টাকা আয় করুন।", "❌");
            withdrawModal.classList.remove('hidden');
        };

        window.closeWithdrawModal = () => {
            withdrawModal.classList.add('hidden');
            selectedPaymentMethod = "";
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
        };

        window.selectMethod = (method) => {
            selectedPaymentMethod = method;
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${method.toLowerCase()}`).classList.add('active');
        };

        window.submitWithdraw = async () => {
            const amount = parseFloat(document.getElementById('withdraw-amount').value);
            const number = document.getElementById('withdraw-number').value;
            const balance = parseFloat(document.getElementById('balance').innerText);

            if(!selectedPaymentMethod) return alert("পেমেন্ট মেথড সিলেক্ট করুন!");
            if(!amount || amount < 50) return alert("সর্বনিম্ন ৫০ টাকা উত্তোলন করুন।");
            if(amount > balance) return alert("আপনার পর্যাপ্ত ব্যালেন্স নেই।");
            if(!number || number.length < 11) return alert("সঠিক নম্বর দিন।");

            const withdrawData = {
                userId: auth.currentUser.uid,
                userName: auth.currentUser.displayName,
                amount: amount,
                number: number,
                method: selectedPaymentMethod,
                status: "Pending",
                timestamp: serverTimestamp(),
                dateStr: new Date().toLocaleString('bn-BD')
            };

            await addDoc(collection(db, 'artifacts', 'ern-93752', 'public', 'withdraws'), withdrawData);
            const userRef = doc(db, 'artifacts', 'ern-93752', 'users', auth.currentUser.uid, 'profile', 'data');
            await updateDoc(userRef, { balance: increment(-amount) });

            closeWithdrawModal();
            showModal("সাফল্য", "আপনার রিকোয়েস্ট পাঠানো হয়েছে। ২-২৪ ঘণ্টার মধ্যে পেমেন্ট পাবেন।", "✅");
        };

        window.toggleHistory = () => {
            const isHidden = historyScreen.classList.contains('hidden');
            if(isHidden) {
                appScreen.classList.add('hidden');
                historyScreen.classList.remove('hidden');
                loadHistory();
            } else {
                appScreen.classList.remove('hidden');
                historyScreen.classList.add('hidden');
            }
        };

        function loadHistory() {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '<div class="text-center py-10 text-slate-500">লোড হচ্ছে...</div>';
            const q = collection(db, 'artifacts', 'ern-93752', 'public', 'withdraws');
            onSnapshot(q, (snapshot) => {
                let html = "";
                const docs = snapshot.docs
                    .map(d => ({id: d.id, ...d.data()}))
                    .filter(d => d.userId === auth.currentUser.uid);

                if(docs.length === 0) {
                    html = '<div class="text-center py-10 text-slate-500">কোন হিস্টোরি পাওয়া যায়নি।</div>';
                } else {
                    docs.forEach(data => {
                        const date = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleDateString('bn-BD') : 'অপেক্ষা করুন..';
                        const statusColor = data.status === 'Paid' ? 'text-green-500' : 'text-yellow-500';
                        html += `
                            <div class="glass p-4 rounded-2xl mb-3 flex justify-between items-center animate-in">
                                <div>
                                    <h4 class="font-bold text-sm">${data.method} - ৳${data.amount}</h4>
                                    <p class="text-[10px] text-slate-500">${date}</p>
                                </div>
                                <div class="text-right">
                                    <span class="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-800 ${statusColor}">${data.status}</span>
                                </div>
                            </div>
                        `;
                    });
                }
                historyList.innerHTML = html;
            });
        }

        window.showModal = (title, text, icon) => {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal-icon').innerText = icon;
            mainModal.classList.remove('hidden');
        };
        window.closeModal = () => mainModal.classList.add('hidden');
    </script>

    <!-- Monetag SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10352096' data-sdk='show_10352096'></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #020617; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-gradient { background: linear-gradient(135deg, #2563eb, #7c3aed); }
        .task-card { transition: all 0.3s ease; cursor: pointer; }
        .task-card:active { transform: scale(0.97); }
        #mini-notice-bar { position: sticky; top: 0; z-index: 100; }
        .method-btn.active { border-color: #2563eb; background: rgba(37, 99, 235, 0.2); }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-28">

    <div id="mini-notice-bar" class="bg-blue-600 text-white py-2 px-4 hidden shadow-lg">
        <marquee id="notice-text" behavior="scroll" direction="left" scrollamount="6" class="text-xs font-bold"></marquee>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[2000] flex flex-col items-center justify-center p-8">
        <div class="text-center mb-10">
            <div class="w-24 h-24 bg-blue-600 rounded-[2rem] mx-auto flex items-center justify-center text-5xl mb-6 shadow-2xl shadow-blue-500/30">
                <i class="fas fa-bolt text-white"></i>
            </div>
            <h1 class="text-4xl font-black text-white italic">EarnPro <span class="text-blue-500">Mini</span></h1>
            <p class="text-slate-400 mt-3 font-medium">Monetag Ads দেখে আয় করুন</p>
        </div>
        <button onclick="signInWithGoogle()" class="w-full max-w-xs bg-white text-slate-900 font-black py-5 rounded-[1.5rem] flex items-center justify-center gap-4 shadow-2xl active:scale-95 transition">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-6 h-6">
            গুগল দিয়ে প্রবেশ করুন
        </button>
    </div>

    <div id="app-screen" class="hidden animate-in">
        <header class="p-6 flex justify-between items-center bg-slate-900/40 border-b border-white/5">
            <div class="flex items-center gap-3">
                <img id="user-photo" src="" class="w-12 h-12 rounded-full border-2 border-blue-500 shadow-xl">
                <div>
                    <h4 id="user-name" class="text-sm font-bold text-white truncate max-w-[120px]">User</h4>
                    <p class="text-[10px] text-blue-400 font-mono" id="user-id-display">ID: ---</p>
                </div>
            </div>
            <div class="glass px-5 py-3 rounded-2xl border-blue-500/20 text-right">
                <p class="text-[9px] text-slate-500 font-bold uppercase">ব্যালেন্স</p>
                <h3 class="text-xl font-black text-green-500">৳<span id="balance">0.00</span></h3>
            </div>
        </header>

        <main class="px-6 mt-6">
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-5 rounded-[2rem] border-b-2 border-blue-500/50 text-center">
                        <i class="fas fa-mouse text-blue-500 mb-2"></i>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">মোট ক্লিক</p>
                        <h4 id="user-clicks" class="text-xl font-black">0</h4>
                    </div>
                    <div class="glass p-5 rounded-[2rem] border-b-2 border-purple-500/50 text-center">
                        <i class="fas fa-coins text-purple-500 mb-2"></i>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">প্রতি কাজ</p>
                        <h4 class="text-xl font-black">৳০.০৭</h4>
                    </div>
                </div>

                <div class="space-y-4">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-tasks text-blue-500"></i> আপনার টাস্ক</h2>
                    
                    <div id="task-card-1" onclick="playInterstitialAd()" class="task-card glass p-5 rounded-[2.5rem] flex items-center justify-between border-l-4 border-blue-500 shadow-lg">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 text-xl"><i class="fas fa-tv"></i></div>
                            <div>
                                <h4 class="font-bold text-base text-white">রিওয়ার্ড অ্যাড (১)</h4>
                                <p class="text-[11px] text-slate-400">ব্যালেন্স যোগ হবে তৎক্ষণাৎ</p>
                            </div>
                        </div>
                        <i class="fas fa-circle-play text-blue-500 text-2xl"></i>
                    </div>

                    <div id="task-card-2" onclick="playPopupAd()" class="task-card glass p-5 rounded-[2.5rem] flex items-center justify-between border-l-4 border-purple-500 shadow-lg">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-purple-500/10 rounded-2xl flex items-center justify-center text-purple-500 text-xl"><i class="fas fa-window-restore"></i></div>
                            <div>
                                <h4 class="font-bold text-base text-white">রিওয়ার্ড পপ-আপ (২)</h4>
                                <p class="text-[11px] text-slate-400">সহজ এবং দ্রুত কাজ</p>
                            </div>
                        </div>
                        <i class="fas fa-circle-play text-purple-500 text-2xl"></i>
                    </div>

                    <div id="task-card-3" onclick="openDirectLink()" class="task-card glass p-5 rounded-[2.5rem] flex items-center justify-between border-l-4 border-green-500 shadow-lg">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-green-500/10 rounded-2xl flex items-center justify-center text-green-500 text-xl"><i class="fas fa-bolt"></i></div>
                            <div>
                                <h4 class="font-bold text-base text-white">ডাইরেক্ট লিঙ্ক টাস্ক</h4>
                                <p class="text-[11px] text-slate-400">৫ সেকেন্ড ভিজিট করুন</p>
                            </div>
                        </div>
                        <i class="fas fa-external-link-alt text-green-500 text-2xl"></i>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- হিস্টোরি -->
    <div id="history-screen" class="hidden animate-in">
        <header class="p-6 flex items-center gap-4 bg-slate-900/40 border-b border-white/5">
            <button onclick="toggleHistory()" class="text-xl p-2"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-xl font-bold">পেমেন্ট হিস্টোরি</h2>
        </header>
        <main class="p-6" id="history-list"></main>
    </div>

    <!-- Nav -->
    <nav class="fixed bottom-0 left-0 w-full glass border-t border-white/5 px-8 py-5 flex justify-between items-center rounded-t-[3rem] z-[100] shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <button onclick="location.reload()" class="text-blue-500 flex flex-col items-center gap-1">
            <i class="fas fa-house-chimney text-xl"></i><span class="text-[9px] font-bold uppercase">Home</span>
        </button>
        <button onclick="toggleHistory()" class="text-slate-500 flex flex-col items-center gap-1">
            <i class="fas fa-clock-rotate-left text-xl"></i><span class="text-[9px] font-bold uppercase">History</span>
        </button>
        <button onclick="openWithdrawModal()" class="text-slate-500 flex flex-col items-center gap-1">
            <i class="fas fa-wallet text-xl"></i><span class="text-[9px] font-bold uppercase">Cashout</span>
        </button>
        <button onclick="logout()" class="text-red-500/70 flex flex-col items-center gap-1">
            <i class="fas fa-power-off text-xl"></i><span class="text-[9px] font-bold uppercase">Logout</span>
        </button>
    </nav>

    <!-- উইথড্র মোডাল -->
    <div id="withdraw-modal" class="fixed inset-0 bg-black/90 z-[3000] hidden flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="glass p-8 rounded-[3rem] w-full max-w-sm border-t-4 border-blue-600 shadow-2xl">
            <h3 class="text-2xl font-black mb-6 text-white text-center">উইথড্র রিকোয়েস্ট</h3>
            <div class="flex gap-3 mb-5">
                <button onclick="selectMethod('Bkash')" id="btn-bkash" class="method-btn flex-1 glass py-4 rounded-2xl border border-white/5 text-sm font-bold transition">বিকাশ</button>
                <button onclick="selectMethod('Nagad')" id="btn-nagad" class="method-btn flex-1 glass py-4 rounded-2xl border border-white/5 text-sm font-bold transition">নগদ</button>
            </div>
            <input type="number" id="withdraw-amount" placeholder="পরিমাণ (৳)" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-5 mb-3 text-white font-bold outline-none focus:border-blue-500">
            <input type="number" id="withdraw-number" placeholder="আপনার নম্বর (১১ ডিজিট)" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-5 mb-8 text-white font-bold outline-none focus:border-blue-500">
            <div class="flex gap-4">
                <button onclick="closeWithdrawModal()" class="flex-1 bg-slate-800 py-5 rounded-2xl font-bold">বাতিল</button>
                <button onclick="submitWithdraw()" class="flex-1 btn-gradient py-5 rounded-2xl font-black shadow-xl">সাবমিট</button>
            </div>
        </div>
    </div>

    <!-- মোডাল -->
    <div id="modal" class="fixed inset-0 bg-black/90 z-[4000] hidden flex items-center justify-center p-6 backdrop-blur-xl">
        <div class="glass p-10 rounded-[3rem] w-full max-w-xs text-center border-t-4 border-blue-600 shadow-2xl">
            <div id="modal-icon" class="text-6xl mb-6 scale-125"></div>
            <h3 id="modal-title" class="text-2xl font-black mb-3 text-white"></h3>
            <p id="modal-text" class="text-slate-400 mb-10 leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full btn-gradient py-5 rounded-2xl font-black shadow-xl tracking-wider">ঠিক আছে</button>
        </div>
    </div>

</body>
</html>
