<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro Max - Password Protected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #070b14; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .card-gradient { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(59, 130, 246, 0.2); }
        .btn-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Auth View -->
    <div id="auth-view" class="hidden flex flex-col items-center justify-center min-h-screen p-8 text-center">
        <div class="relative mb-8 animate-bounce-slow">
            <div class="absolute inset-0 bg-blue-600 blur-3xl opacity-20"></div>
            <div class="relative bg-slate-800 p-8 rounded-[3rem] border border-blue-500/20">
                <i class="fas fa-gem text-6xl text-blue-500"></i>
            </div>
        </div>
        <h1 class="text-5xl font-black mb-4 tracking-tighter">Earn<span class="text-blue-500">Pro</span></h1>
        <p class="text-slate-400 mb-10 text-lg">সরাসরি বিকাশ ও নগদে ইনকাম করুন।</p>
        <button onclick="googleLogin()" class="flex items-center gap-4 bg-white text-black px-12 py-5 rounded-[2rem] font-bold text-xl hover:scale-105 transition shadow-2xl">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-8 h-8" alt="Google">
            লগইন করতে ক্লিক করুন
        </button>
    </div>

    <!-- Admin Password Modal -->
    <div id="admin-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[200] hidden flex items-center justify-center p-6">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm border border-blue-500/30 text-center">
            <i class="fas fa-shield-alt text-4xl text-blue-500 mb-4"></i>
            <h3 class="text-xl font-bold mb-6">এডমিন ভেরিফিকেশন</h3>
            <input id="admin-pass-input" type="password" placeholder="সিক্রেট পাসওয়ার্ড" class="w-full bg-slate-800 border-none rounded-2xl p-5 mb-4 outline-none text-center font-bold tracking-widest">
            <div class="flex gap-3">
                <button onclick="closeAdminModal()" class="flex-1 bg-slate-700 py-4 rounded-2xl font-bold">বাতিল</button>
                <button onclick="verifyAdminPass()" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold">প্রবেশ করুন</button>
            </div>
        </div>
    </div>

    <!-- Main View -->
    <div id="main-view" class="hidden max-w-xl mx-auto px-4">
        
        <header class="flex justify-between items-center py-8">
            <div class="flex items-center gap-4">
                <img id="user-photo" src="" class="w-14 h-14 rounded-2xl border-2 border-blue-500/50 shadow-lg" alt="User">
                <div>
                    <h2 id="user-name" class="font-bold text-xl leading-none truncate w-40 text-blue-400">লোড হচ্ছে...</h2>
                    <p id="user-display-id" class="text-[10px] text-slate-500 font-bold mt-1 uppercase tracking-widest">ID: Fetching...</p>
                </div>
            </div>
            <button id="admin-btn" onclick="openAdminModal()" class="hidden bg-red-600/20 text-red-500 border border-red-500/50 px-4 py-2 rounded-xl font-bold text-xs animate-pulse">অ্যাডমিন প্যানেল</button>
        </header>

        <!-- Home Tab -->
        <div id="tab-home" class="space-y-8 animate-in fade-in duration-700">
            <div class="card-gradient p-12 rounded-[3.5rem] relative overflow-hidden shadow-2xl text-center">
                <p class="text-xs text-slate-500 uppercase tracking-[0.2em] mb-4 font-bold">আপনার ব্যালেন্স</p>
                <h1 class="text-7xl font-black text-white tracking-tighter">৳<span id="user-balance">0.00</span></h1>
                
                <div class="grid grid-cols-2 gap-4 mt-10 pt-8 border-t border-white/5">
                    <div>
                        <p class="text-[10px] text-slate-500 uppercase font-bold">মোট ক্লিক</p>
                        <p id="user-clicks" class="text-2xl font-bold text-blue-400">0</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-500 uppercase font-bold">রেট</p>
                        <p class="text-sm font-bold text-green-500">৳০.০৫/অ্যাড</p>
                    </div>
                </div>
            </div>

            <!-- Task Section -->
            <div class="space-y-4">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-1 rounded-[3rem] shadow-2xl">
                    <div class="bg-slate-900 p-8 rounded-[2.9rem] flex flex-col items-center text-center">
                        <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center text-blue-500 text-4xl mb-6 border border-blue-500/20">
                            <i class="fas fa-play-circle"></i>
                        </div>
                        <h4 class="text-2xl font-black mb-2">Monetag Direct Ads</h4>
                        <p class="text-sm text-slate-400 mb-8 max-w-[220px]">অ্যাড না আসলে ব্রাউজারের অ্যাড-ব্লকার অফ করুন এবং ভিপিএন ইউজ করুন।</p>
                        
                        <button id="task-btn" onclick="handleDirectLink('https://omg10.com/4/10927827', 0.05)" 
                                class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xl btn-glow hover:bg-blue-500 transition flex items-center justify-center gap-3">
                            <span>অ্যাড দেখুন</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Withdraw Tab -->
        <div id="tab-withdraw" class="hidden space-y-6 pt-4">
            <h2 class="text-3xl font-black px-4">ক্যাশ আউট</h2>
            <div class="glass p-8 rounded-[3rem] space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <select id="method" class="w-full bg-slate-800 border-none rounded-2xl p-5 outline-none font-bold">
                            <option value="bKash">বিকাশ</option>
                            <option value="Nagad">নগদ</option>
                        </select>
                    </div>
                    <div class="col-span-1">
                        <input id="withdraw-amount" type="number" placeholder="পরিমাণ" class="w-full bg-slate-800 border-none rounded-2xl p-5 outline-none font-bold">
                    </div>
                    <div class="col-span-1">
                        <input id="pay-number" type="tel" placeholder="নম্বর" class="w-full bg-slate-800 border-none rounded-2xl p-5 outline-none font-bold">
                    </div>
                </div>
                <button onclick="handleWithdraw()" class="w-full bg-green-600 py-5 rounded-[2rem] font-black text-xl shadow-xl hover:bg-green-500">সাবমিট করুন</button>
            </div>
            <div id="history-list" class="space-y-4 pb-12"></div>
        </div>

        <!-- Navigation -->
        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-md glass rounded-[2.5rem] p-3 flex justify-around shadow-2xl z-50 border border-white/10">
            <button onclick="switchTab('home')" id="nav-home" class="p-4 rounded-2xl text-blue-500"><i class="fas fa-home text-2xl"></i></button>
            <button onclick="switchTab('withdraw')" id="nav-withdraw" class="p-4 rounded-2xl text-slate-500"><i class="fas fa-wallet text-2xl"></i></button>
            <button onclick="logout()" class="p-4 rounded-2xl text-slate-500"><i class="fas fa-power-off text-2xl"></i></button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 px-8 py-4 rounded-full bg-white text-black font-black shadow-2xl hidden z-[100] text-sm"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJwBkkuTwCpnEB6-JD4axqms5OniGr9-s",
            authDomain: "ern-93752.firebaseapp.com",
            databaseURL: "https://ern-93752-default-rtdb.firebaseio.com",
            projectId: "ern-93752",
            storageBucket: "ern-93752.firebasestorage.app",
            messagingSenderId: "159583001756",
            appId: "1:159583001756:web:c7c8380f88da94ba97e159",
            measurementId: "G-S8FXSQMLR3"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // ADMIN CONFIG
        const ADMIN_ID = "7635408986"; 
        const ADMIN_PASS = "admin1234"; // পাসওয়ার্ড এখান থেকে পরিবর্তন করতে পারেন

        let currentUser = null;

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName || "User";
                document.getElementById('user-photo').src = user.photoURL || 'https://via.placeholder.com/150';
                document.getElementById('user-display-id').innerText = "ID: " + user.uid.substring(0, 10);
                
                // Show admin button if UID matches
                if (user.uid === ADMIN_ID || user.email === "finalsafin@gmail.com") {
                    document.getElementById('admin-btn').classList.remove('hidden');
                }

                // Initialize user data
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                if (!doc.exists()) {
                    await userRef.set({
                        uid: user.uid,
                        name: user.displayName,
                        email: user.email,
                        balance: 0,
                        clicks: 0,
                        lastActive: Date.now()
                    });
                }
                
                syncUserData();
                loadHistory();
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('main-view').classList.add('hidden');
            }
        });

        // Admin Security Functions
        window.openAdminModal = () => document.getElementById('admin-modal').classList.remove('hidden');
        window.closeAdminModal = () => document.getElementById('admin-modal').classList.add('hidden');
        
        window.verifyAdminPass = () => {
            const input = document.getElementById('admin-pass-input').value;
            if (input === ADMIN_PASS) {
                showToast("পাসওয়ার্ড সঠিক! ড্যাশবোর্ড খুলছে...");
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                showToast("ভুল পাসওয়ার্ড! চেষ্টা করুন।");
                document.getElementById('admin-pass-input').value = "";
            }
        };

        window.googleLogin = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        window.logout = () => auth.signOut();

        function syncUserData() {
            db.collection('users').doc(currentUser.uid).onSnapshot(doc => {
                if (doc.exists()) {
                    const data = doc.data();
                    document.getElementById('user-balance').innerText = (data.balance || 0).toFixed(2);
                    document.getElementById('user-clicks').innerText = data.clicks || 0;
                }
            });
        }

        window.handleDirectLink = async (url, amt) => {
            if (!currentUser) return;
            const btn = document.getElementById('task-btn');
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = `<span class="loader"></span> <span>লোড হচ্ছে...</span>`;
            btn.disabled = true;

            try {
                const userRef = db.collection('users').doc(currentUser.uid);
                await db.runTransaction(async (transaction) => {
                    const userDoc = await transaction.get(userRef);
                    const currentBalance = userDoc.data().balance || 0;
                    const currentClicks = userDoc.data().clicks || 0;
                    transaction.update(userRef, { 
                        balance: currentBalance + amt, 
                        clicks: currentClicks + 1 
                    });
                });

                showToast("৳০.০৫ ব্যালেন্স অ্যাড হয়েছে!");
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    window.open(url, '_blank');
                }, 1000);
            } catch (e) {
                showToast("ইন্টারনেট চেক করুন!");
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        };

        window.handleWithdraw = async () => {
            const amt = parseFloat(document.getElementById('withdraw-amount').value);
            const num = document.getElementById('pay-number').value;
            const method = document.getElementById('method').value;

            if (amt < 100) return showToast("মিনিমাম ১০০ টাকা!");
            if (!num || num.length < 11) return showToast("সঠিক নম্বর দিন!");

            const userRef = db.collection('users').doc(currentUser.uid);
            const doc = await userRef.get();
            if (doc.data().balance >= amt) {
                await db.collection('withdraws').add({
                    uid: currentUser.uid,
                    name: currentUser.displayName,
                    amount: amt,
                    number: num,
                    method: method,
                    status: 'Pending',
                    time: Date.now()
                });
                await userRef.update({ balance: firebase.firestore.FieldValue.increment(-amt) });
                showToast("অনুরোধ পাঠানো হয়েছে!");
            } else showToast("ব্যালেন্স নেই!");
        };

        function loadHistory() {
            db.collection('withdraws').where('uid', '==', currentUser.uid).onSnapshot(snap => {
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = "glass p-5 rounded-2xl flex justify-between items-center";
                    div.innerHTML = `<div><p class='font-bold'>৳${d.amount}</p><p class='text-[10px]'>${d.method} - ${d.status}</p></div><i class='fas fa-clock text-yellow-500'></i>`;
                    list.appendChild(div);
                });
            });
        }

        window.switchTab = (tab) => {
            const isHome = tab === 'home';
            document.getElementById('tab-home').classList.toggle('hidden', !isHome);
            document.getElementById('tab-withdraw').classList.toggle('hidden', isHome);
            document.getElementById('nav-home').classList.toggle('text-blue-500', isHome);
            document.getElementById('nav-withdraw').classList.toggle('text-blue-500', !isHome);
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
