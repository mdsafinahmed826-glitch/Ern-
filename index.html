<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro Max - Admin Access Enabled</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #070b14; color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .card-gradient { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(59, 130, 246, 0.2); }
        .vpn-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- VPN Block Overlay -->
    <div id="vpn-blocker" class="vpn-overlay">
        <i class="fas fa-user-shield text-6xl text-red-500 mb-6"></i>
        <h1 class="text-3xl font-black mb-4 text-white">VPN সনাক্ত হয়েছে!</h1>
        <p class="text-slate-400 mb-8">দয়া করে VPN বা Proxy বন্ধ করুন।</p>
        <button onclick="window.location.reload()" class="bg-blue-600 px-10 py-4 rounded-full font-bold">আবার চেষ্টা করুন</button>
    </div>

    <!-- Auth View -->
    <div id="auth-view" class="hidden flex flex-col items-center justify-center min-h-screen p-8 text-center">
        <h1 class="text-5xl font-black mb-4 tracking-tighter">Earn<span class="text-blue-500">Pro</span></h1>
        <button onclick="googleLogin()" class="flex items-center gap-4 bg-white text-black px-12 py-5 rounded-[2rem] font-bold text-xl hover:scale-105 transition shadow-2xl">
            লগইন করতে ক্লিক করুন
        </button>
    </div>

    <!-- Admin Password Modal -->
    <div id="admin-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[200] hidden flex items-center justify-center p-6">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm border border-blue-500/30 text-center">
            <h3 class="text-xl font-bold mb-6 text-blue-400">অ্যাডমিন প্রবেশ</h3>
            <input id="admin-pass-input" type="password" placeholder="পাসওয়ার্ড লিখুন" class="w-full bg-slate-800 border-none rounded-2xl p-5 mb-4 outline-none text-center font-bold tracking-widest text-white">
            <div class="flex gap-3">
                <button onclick="closeAdminModal()" class="flex-1 bg-slate-700 py-4 rounded-2xl font-bold">বাতিল</button>
                <button onclick="verifyAdminPass()" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold">প্রবেশ</button>
            </div>
        </div>
    </div>

    <!-- Main View -->
    <div id="main-view" class="hidden max-w-xl mx-auto px-4">
        <header class="flex justify-between items-center py-8">
            <div class="flex items-center gap-4">
                <img id="user-photo" src="" class="w-12 h-12 rounded-xl border border-blue-500/30" alt="User">
                <div>
                    <h2 id="user-name" class="font-bold text-lg text-blue-400">লোড হচ্ছে...</h2>
                    <p id="user-display-id" class="text-[10px] text-slate-500 font-bold uppercase">ID: ...</p>
                </div>
            </div>
            <!-- Admin Button: Only visible to you -->
            <button id="admin-btn" onclick="openAdminModal()" class="hidden bg-red-600/20 text-red-500 border border-red-500/50 px-4 py-2 rounded-xl font-bold text-xs animate-pulse">অ্যাডমিন প্যানেল</button>
        </header>

        <div id="tab-home" class="space-y-8">
            <div class="card-gradient p-10 rounded-[3rem] text-center shadow-2xl">
                <p class="text-xs text-slate-500 uppercase tracking-widest mb-2">ব্যালেন্স</p>
                <h1 class="text-6xl font-black text-white">৳<span id="user-balance">0.00</span></h1>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <h3 class="text-xl font-black px-2">টাস্ক লিস্ট</h3>
                <button onclick="handleDirectLink('https://omg10.com/4/10927827', 0.05, 1)" class="w-full card-gradient p-6 rounded-[2rem] flex justify-between items-center hover:border-blue-500 transition">
                    <span class="font-bold">টাস্ক ০১ (৳০.০৫)</span>
                    <i class="fas fa-play text-blue-500"></i>
                </button>
                <button onclick="handleDirectLink('https://omg10.com/4/10353323', 0.05, 2)" class="w-full card-gradient p-6 rounded-[2rem] flex justify-between items-center hover:border-blue-500 transition">
                    <span class="font-bold">টাস্ক ০২ (৳০.০৫)</span>
                    <i class="fas fa-play text-indigo-500"></i>
                </button>
                <button onclick="handleDirectLink('https://omg10.com/4/10927819', 0.05, 3)" class="w-full card-gradient p-6 rounded-[2rem] flex justify-between items-center hover:border-blue-500 transition">
                    <span class="font-bold">টাস্ক ০৩ (৳০.০৫)</span>
                    <i class="fas fa-play text-purple-500"></i>
                </button>
                <button onclick="handleDirectLink('https://omg10.com/4/10927814', 0.05, 4)" class="w-full card-gradient p-6 rounded-[2rem] flex justify-between items-center hover:border-blue-500 transition">
                    <span class="font-bold">টাস্ক ০৪ (৳০.০৫)</span>
                    <i class="fas fa-play text-green-500"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-blue-600 text-white font-bold hidden z-[300]"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJwBkkuTwCpnEB6-JD4axqms5OniGr9-s",
            authDomain: "ern-93752.firebaseapp.com",
            projectId: "ern-93752",
            storageBucket: "ern-93752.firebasestorage.app",
            messagingSenderId: "159583001756",
            appId: "1:159583001756:web:c7c8380f88da94ba97e159"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // আপনার ডিটেইলস
        const MY_ADMIN_ID = "7635408986"; 
        const MY_ADMIN_EMAIL = "finalsafin@gmail.com";
        const SECRET_PASS = "admin1234"; 

        let isVPN = false;

        async function checkVPN() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if (data.proxy || data.org?.includes('VPN') || data.org?.includes('Cloudflare')) {
                    document.getElementById('vpn-blocker').style.display = 'flex';
                    isVPN = true;
                }
            } catch (e) {}
        }

        auth.onAuthStateChanged(async (user) => {
            await checkVPN();
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-display-id').innerText = "ID: " + user.uid.substring(0, 12);
                
                // আপনার আইডি বা ইমেইল মিললে বাটন দেখাবে
                if (user.uid === MY_ADMIN_ID || user.email === MY_ADMIN_EMAIL) {
                    document.getElementById('admin-btn').classList.remove('hidden');
                }

                syncData(user.uid);
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('main-view').classList.add('hidden');
            }
        });

        function syncData(uid) {
            db.collection('users').doc(uid).onSnapshot(doc => {
                if (doc.exists) {
                    document.getElementById('user-balance').innerText = (doc.data().balance || 0).toFixed(2);
                } else {
                    db.collection('users').doc(uid).set({ balance: 0, clicks: 0, name: auth.currentUser.displayName });
                }
            });
        }

        window.openAdminModal = () => document.getElementById('admin-modal').classList.remove('hidden');
        window.closeAdminModal = () => document.getElementById('admin-modal').classList.add('hidden');

        window.verifyAdminPass = () => {
            const pass = document.getElementById('admin-pass-input').value;
            if (pass === SECRET_PASS) {
                window.location.href = 'admin.html';
            } else {
                showToast("ভুল পাসওয়ার্ড!");
            }
        };

        window.googleLogin = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());

        window.handleDirectLink = async (url, amt, t) => {
            if (isVPN) return showToast("VPN বন্ধ করুন!");
            const userRef = db.collection('users').doc(auth.currentUser.uid);
            await userRef.update({ balance: firebase.firestore.FieldValue.increment(amt) });
            showToast(`টাস্ক ${t} সফল! ৳${amt} যোগ হয়েছে।`);
            window.open(url, '_blank');
        };

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        setInterval(checkVPN, 15000);
    </script>
</body>
</html>
