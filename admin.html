<!-- এই কোডটি আপনার index.html এর <script> ট্যাগের ভেতরে একদম উপরে বা শেষে যোগ করুন -->

<script>
// ১. অ্যাডমিন সেটিংস হ্যান্ডলার (Notice, Maintenance, Task Control)
function syncWithAdminPanel() {
    // নোটিশ বার তৈরি (যদি না থাকে)
    if (!document.getElementById('global-notice-bar')) {
        const nb = document.createElement('div');
        nb.id = 'global-notice-bar';
        nb.style = "position:fixed; top:0; left:0; width:100%; background:#2563eb; color:white; font-size:11px; padding:5px; z-index:9999; text-align:center; display:none;";
        nb.innerHTML = `<marquee id="notice-text-scroll"></marquee>`;
        document.body.prepend(nb);
    }

    // মেইনটেন্যান্স ওভারলে তৈরি
    if (!document.getElementById('maint-screen')) {
        const ms = document.createElement('div');
        ms.id = 'maint-screen';
        ms.style = "position:fixed; inset:0; background:#020617; z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px;";
        ms.innerHTML = `<i class="fas fa-tools" style="font-size:50px; color:#2563eb; margin-bottom:20px;"></i>
                        <h2 style="font-size:24px; font-weight:bold;">Maintenance Mode</h2>
                        <p style="color:#94a3b8; margin-top:10px;">আমরা অ্যাপটি আপডেট করছি। কিছুক্ষণের মধ্যেই ফিরে আসব।</p>`;
        document.body.appendChild(ms);
    }

    // ফায়ারবেস থেকে লাইভ ডেটা শোনা
    db.collection('admin_settings').doc('global').onSnapshot(doc => {
        if (doc.exists) {
            const data = doc.data();

            // ক. নোটিশ আপডেট
            if (data.notice && data.notice.trim() !== "") {
                document.getElementById('notice-text-scroll').innerText = data.notice;
                document.getElementById('global-notice-bar').style.display = 'block';
                document.body.style.paddingTop = '30px';
            } else {
                document.getElementById('global-notice-bar').style.display = 'none';
                document.body.style.paddingTop = '0';
            }

            // খ. মেইনটেন্যান্স মোড
            document.getElementById('maint-screen').style.display = data.maintenance ? 'flex' : 'none';

            // গ. কাজের অপশন অন/অফ (ধরা যাক আপনার বাটনের আইডি task-btn-1)
            // আপনার index.html এ থাকা টাস্ক বাটনগুলোর আইডি এখানে মিলিয়ে নিন
            if (data.tasks) {
                const interstitialBtn = document.getElementById('task-btn-interstitial');
                const popupBtn = document.getElementById('task-btn-popup');
                
                if(interstitialBtn) interstitialBtn.style.display = data.tasks.interstitial === false ? 'none' : 'flex';
                if(popupBtn) popupBtn.style.display = data.tasks.popup === false ? 'none' : 'flex';
            }
        }
    });
}

// আপনার Firebase App Initialize হওয়ার পর এই ফাংশনটি কল করুন

</script>
